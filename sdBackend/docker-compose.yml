# ═══════════════════════════════════════════════════════════
#  GraphMind — Docker Compose (Neo4j + Qdrant + FastAPI)
# ═══════════════════════════════════════════════════════════
version: "3.9"

services:
  # ── Neo4j Graph Database ──
  neo4j:
    image: neo4j:latest
    container_name: graphmind-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/12345678
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "12345678", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: graphmind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI Backend ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphmind-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434   # Reach Ollama on host
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Docker → host networking (WSL2)
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./app:/code/app          # Hot-reload in dev
      - embedding_cache:/root/.cache   # Cache fastembed models

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  embedding_cache:
