services:
  neo4j:
    image: neo4j:latest
    container_name: graphmind-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (optional, remove in production)
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-graphmind123}
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: graphmind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Neo4j URI to use the Docker service name
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    container_name: graphmind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
